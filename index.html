<script>
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz8qAOT3ry-HRZmdpTzWWI5h61896QGClGdvrQ7qVg6Do6nUzIu0H7JpHWr0J08zpbj/exec";

  const inquiryType = document.getElementById("inquiryType");
  const detailCategory = document.getElementById("detailCategory");
  const msoTabs = document.getElementById("msoTabs");
  const eduTabs = document.getElementById("eduTabs");
  const result = document.getElementById("result");
  const crmForm = document.getElementById("crmForm");

  let crmListData = [];

  const categories = {
    "MSO": ["마케팅", "디자인", "CS교육", "운영"],
    "의학교육": ["위내시경", "FNA", "CNB"]
  };

  const sectionMap = {
    "마케팅": "marketingSection",
    "디자인": "designSection",
    "CS교육": "csSection",
    "운영": "operationSection",
    "위내시경": "educationSection",
    "FNA": "educationSection",
    "CNB": "educationSection"
  };

  function updateInquiryType() {
    const type = inquiryType.value;

    detailCategory.innerHTML = "";

    const first = document.createElement("option");
    first.value = "";
    first.textContent = type ? "세부카테고리 선택" : "문의유형을 먼저 선택";
    detailCategory.appendChild(first);

    (categories[type] || []).forEach(function(item) {
      const opt = document.createElement("option");
      opt.value = item;
      opt.textContent = item;
      detailCategory.appendChild(opt);
    });

    msoTabs.classList.toggle("hide", type !== "MSO");
    eduTabs.classList.toggle("hide", type !== "의학교육");

    clearDetailSections();
    clearActiveTabs();
    document.getElementById("detailEmpty").classList.remove("hide");
  }

  function selectDetailTab(category) {
    detailCategory.value = category;
    updateDetailSection();
  }

  function updateDetailSection() {
    const category = detailCategory.value;

    clearDetailSections();
    clearActiveTabs();

    if (!category) {
      document.getElementById("detailEmpty").classList.remove("hide");
      return;
    }

    const sectionId = sectionMap[category];

    if (sectionId) {
      document.getElementById("detailEmpty").classList.add("hide");
      document.getElementById(sectionId).classList.remove("hide");
    }

    document.querySelectorAll(".tab-btn").forEach(function(btn) {
      if (btn.dataset.category === category) {
        btn.classList.add("active");
      }
    });

    if (category === "위내시경" || category === "FNA" || category === "CNB") {
      const courseSelect = document.querySelector('[name="교육_과정"]');
      if (courseSelect) courseSelect.value = category;
    }
  }

  function clearDetailSections() {
    [
      "marketingSection",
      "designSection",
      "csSection",
      "operationSection",
      "educationSection"
    ].forEach(function(id) {
      const el = document.getElementById(id);
      if (el) el.classList.add("hide");
    });
  }

  function clearActiveTabs() {
    document.querySelectorAll(".tab-btn").forEach(function(btn) {
      btn.classList.remove("active");
    });
  }

  function resetForm() {
    crmForm.reset();
    updateInquiryType();
    result.className = "result";
    result.innerHTML = "";
  }

  function showMessage(type, message) {
    result.className = "result " + type;
    result.innerHTML = message;
  }

  function getFormDataObject(form) {
    const data = {};
    const formData = new FormData(form);

    for (const [key, value] of formData.entries()) {
      if (data[key]) {
        data[key] += ", " + value;
      } else {
        data[key] = value;
      }
    }

    return data;
  }

  function escapeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  crmForm.addEventListener("submit", async function(e) {
    e.preventDefault();

    if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("여기에_")) {
      showMessage("err", "Apps Script URL이 입력되지 않았습니다.");
      return;
    }

    const payload = getFormDataObject(crmForm);

    payload["상담ID"] = "CRM-" + Date.now();
    payload["접수일시"] = new Date().toLocaleString("sv-SE", {
      timeZone: "Asia/Seoul"
    }).replace("T", " ");

    try {
      await fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
        },
        body: new URLSearchParams({
          payload: JSON.stringify(payload)
        })
      });

      showMessage("ok", "저장 요청이 전송되었습니다. 구글시트에서 접수 내역을 확인해주세요.");

    } catch (error) {
      showMessage("err", "저장 중 오류가 발생했습니다: " + error.message);
    }
  });

  function loadCrmList() {
    const listResult = document.getElementById("listResult");
    const debugBox = document.getElementById("listDebugBox");

    if (!listResult) {
      alert("상담 신청서 리스트 영역이 없습니다.");
      return;
    }

    if (debugBox) {
      debugBox.style.display = "none";
      debugBox.textContent = "";
    }

    if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("여기에_")) {
      listResult.innerHTML = '<div class="empty-message">Apps Script URL이 입력되지 않았습니다.</div>';
      return;
    }

    listResult.innerHTML = '<div class="empty-message">상담 신청서를 불러오는 중입니다...</div>';

    const callbackName = "crmListCallback_" + Date.now();

    const timeout = setTimeout(function() {
      listResult.innerHTML = '<div class="empty-message">리스트 응답이 없습니다.<br>Apps Script 배포 상태 또는 URL을 확인해주세요.</div>';

      if (debugBox) {
        debugBox.style.display = "block";
        debugBox.textContent = "요청 URL:\n" + buildCrmListUrl(callbackName);
      }

      delete window[callbackName];

      const oldScript = document.getElementById(callbackName);
      if (oldScript) oldScript.remove();
    }, 12000);

    window[callbackName] = function(response) {
      clearTimeout(timeout);

      try {
        if (debugBox) {
          debugBox.style.display = "block";
          debugBox.textContent = "응답 성공:\n" + JSON.stringify(response, null, 2).slice(0, 2500);
        }

        if (!response) {
          listResult.innerHTML = '<div class="empty-message">응답 데이터가 없습니다.</div>';
          return;
        }

        if (response.result !== "success") {
          listResult.innerHTML =
            '<div class="empty-message">Apps Script 오류:<br>' +
            escapeHtml(response.message || "알 수 없는 오류") +
            '</div>';
          return;
        }

        crmListData = response.data || [];

        if (crmListData.length === 0) {
          listResult.innerHTML =
            '<div class="empty-message">불러올 상담 신청서가 없습니다.<br>구글시트에 CRM-으로 시작하는 상담ID가 있는지 확인해주세요.</div>';
          return;
        }

        renderCrmList();

      } catch (error) {
        listResult.innerHTML =
          '<div class="empty-message">리스트 표시 중 오류:<br>' +
          escapeHtml(error.message) +
          '</div>';

      } finally {
        delete window[callbackName];

        const scriptTag = document.getElementById(callbackName);
        if (scriptTag) scriptTag.remove();
      }
    };

    const script = document.createElement("script");
    script.id = callbackName;
    script.src = buildCrmListUrl(callbackName);

    script.onerror = function() {
      clearTimeout(timeout);

      listResult.innerHTML =
        '<div class="empty-message">Apps Script 요청에 실패했습니다.<br>GitHub HTML의 GOOGLE_SCRIPT_URL 값을 확인해주세요.</div>';

      if (debugBox) {
        debugBox.style.display = "block";
        debugBox.textContent = "요청 실패 URL:\n" + script.src;
      }

      delete window[callbackName];
    };

    document.body.appendChild(script);
  }

  function buildCrmListUrl(callbackName) {
    return GOOGLE_SCRIPT_URL
      + "?action=list"
      + "&callback=" + encodeURIComponent(callbackName)
      + "&t=" + Date.now();
  }

  function renderCrmList() {
    const listResult = document.getElementById("listResult");

    const typeEl = document.getElementById("listFilterType");
    const categoryEl = document.getElementById("listFilterCategory");
    const statusEl = document.getElementById("listFilterStatus");
    const keywordEl = document.getElementById("listSearchKeyword");

    const type = typeEl ? typeEl.value : "";
    const category = categoryEl ? categoryEl.value : "";
    const status = statusEl ? statusEl.value : "";
    const keyword = keywordEl ? keywordEl.value.trim().toLowerCase() : "";

    let list = crmListData.filter(function(item) {
      const matchType = !type || item["문의유형"] === type;
      const matchCategory = !category || item["세부카테고리"] === category;
      const matchStatus = !status || item["상담상태"] === status;

      const searchText = [
        item["상담ID"],
        item["병원/기관명"],
        item["대표자/원장명"],
        item["문의자명"],
        item["연락처"],
        item["담당자"],
        item["지역"],
        item["1차 상담 요약"],
        item["상담 메모"]
      ].join(" ").toLowerCase();

      const matchKeyword = !keyword || searchText.includes(keyword);

      return matchType && matchCategory && matchStatus && matchKeyword;
    });

    if (list.length === 0) {
      listResult.innerHTML =
        '<div class="empty-message">현재 필터 조건에 맞는 상담 신청서가 없습니다.<br>필터를 전체로 바꿔보세요.</div>';
      return;
    }

    const rows = list.map(function(item, index) {
      const typeClass = item["문의유형"] === "MSO" ? "badge-mso" : "badge-edu";

      return `
        <tr>
          <td>${escapeHtml(item["접수일시"])}</td>
          <td>${escapeHtml(item["상담단계"])}</td>
          <td><span class="badge ${typeClass}">${escapeHtml(item["문의유형"])}</span></td>
          <td>${escapeHtml(item["세부카테고리"])}</td>
          <td>${escapeHtml(item["상담상태"])}</td>
          <td>${escapeHtml(item["병원/기관명"])}</td>
          <td>${escapeHtml(item["문의자명"])}</td>
          <td>${escapeHtml(item["연락처"])}</td>
          <td>${escapeHtml(item["담당자"])}</td>
          <td>${escapeHtml(item["다음연락일"])}</td>
          <td>${escapeHtml(item["전환가능성"])}</td>
          <td>
            <button type="button" class="secondary" onclick="toggleCrmDetail(${index})">상세</button>
          </td>
        </tr>
        <tr id="crmDetail_${index}" class="detail-row hide">
          <td colspan="12">
            ${buildDetailCard(item)}
          </td>
        </tr>
      `;
    }).join("");

    listResult.innerHTML = `
      <table class="crm-table">
        <thead>
          <tr>
            <th>접수일시</th>
            <th>상담단계</th>
            <th>문의유형</th>
            <th>세부</th>
            <th>상담상태</th>
            <th>병원/기관명</th>
            <th>문의자</th>
            <th>연락처</th>
            <th>담당자</th>
            <th>다음 연락일</th>
            <th>전환가능성</th>
            <th>상세</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>
    `;
  }

  function toggleCrmDetail(index) {
    const row = document.getElementById("crmDetail_" + index);
    if (!row) return;
    row.classList.toggle("hide");
  }

  function buildDetailCard(item) {
    const category = item["세부카테고리"];

    let categoryDetail = "";

    if (category === "마케팅") {
      categoryDetail = `
        <p><strong>주요고민:</strong> ${escapeHtml(item["마케팅_주요고민"])}</p>
        <p><strong>매출 감소:</strong> ${escapeHtml(item["마케팅_매출감소시점"])} / ${escapeHtml(item["마케팅_전년대비감소율"])}</p>
        <p><strong>월 신규 환자 수:</strong> ${escapeHtml(item["마케팅_월신규환자수"])}</p>
        <p><strong>주요 유입 경로:</strong> ${escapeHtml(item["마케팅_주요유입경로"])} / ${escapeHtml(item["마케팅_최근유입변화"])}</p>
        <p><strong>월 예산:</strong> ${escapeHtml(item["마케팅_월예산"])}</p>
        <p><strong>주요 진료/수익:</strong> ${escapeHtml(item["마케팅_주요진료수익항목"])}</p>
        <p><strong>경쟁병원:</strong> ${escapeHtml(item["마케팅_경쟁병원현황"])}</p>
        <p><strong>현재 운영:</strong> ${escapeHtml(item["마케팅_현재운영현황"])}</p>
        <p><strong>온라인 진단 메모:</strong> ${escapeHtml(item["마케팅_온라인진단메모"])}</p>
        <p><strong>개선 희망사항:</strong> ${escapeHtml(item["마케팅_개선희망사항"])}</p>
      `;
    } else if (category === "디자인") {
      categoryDetail = `
        <p><strong>필요 범위:</strong> ${escapeHtml(item["디자인_필요범위"])}</p>
        <p><strong>홈페이지 상태:</strong> ${escapeHtml(item["디자인_홈페이지상태"])}</p>
        <p><strong>브랜드 톤:</strong> ${escapeHtml(item["디자인_브랜드톤"])}</p>
        <p><strong>현재 문제:</strong> ${escapeHtml(item["디자인_현재문제"])}</p>
        <p><strong>필요 제작물:</strong> ${escapeHtml(item["디자인_필요제작물"])}</p>
        <p><strong>레퍼런스:</strong> ${escapeHtml(item["디자인_레퍼런스"])}</p>
      `;
    } else if (category === "CS교육") {
      categoryDetail = `
        <p><strong>직원 수:</strong> ${escapeHtml(item["CS_직원수"])}</p>
        <p><strong>정기교육:</strong> ${escapeHtml(item["CS_정기교육여부"])}</p>
        <p><strong>매뉴얼:</strong> ${escapeHtml(item["CS_매뉴얼구축"])}</p>
        <p><strong>주요 이슈:</strong> ${escapeHtml(item["CS_주요이슈"])}</p>
        <p><strong>문제 상세:</strong> ${escapeHtml(item["CS_문제상세"])}</p>
        <p><strong>교육 희망 방향:</strong> ${escapeHtml(item["CS_교육희망방향"])}</p>
      `;
    } else if (category === "운영") {
      categoryDetail = `
        <p><strong>의사 수:</strong> ${escapeHtml(item["운영_의사수"])}</p>
        <p><strong>직원 수:</strong> ${escapeHtml(item["운영_직원수"])}</p>
        <p><strong>월 평균 내원:</strong> ${escapeHtml(item["운영_월평균내원수"])}</p>
        <p><strong>원장 업무량:</strong> ${escapeHtml(item["운영_원장업무량"])}</p>
        <p><strong>매뉴얼 구축:</strong> ${escapeHtml(item["운영_매뉴얼구축"])}</p>
        <p><strong>운영 우선순위:</strong> ${escapeHtml(item["운영_우선순위"])}</p>
        <p><strong>현재 문제:</strong> ${escapeHtml(item["운영_현재문제"])}</p>
        <p><strong>개선 방향:</strong> ${escapeHtml(item["운영_개선방향"])}</p>
      `;
    } else {
      categoryDetail = `
        <p><strong>교육 과정:</strong> ${escapeHtml(item["교육_과정"])}</p>
        <p><strong>의사면허:</strong> ${escapeHtml(item["교육_의사면허유무"])}</p>
        <p><strong>면허번호:</strong> ${escapeHtml(item["교육_면허번호"])}</p>
        <p><strong>전공/진료과:</strong> ${escapeHtml(item["교육_전공진료과"])}</p>
        <p><strong>경력:</strong> ${escapeHtml(item["교육_경력"])}</p>
        <p><strong>술기 경험:</strong> ${escapeHtml(item["교육_술기경험"])}</p>
        <p><strong>희망 일정:</strong> ${escapeHtml(item["교육_희망일정"])}</p>
        <p><strong>대상 적합성:</strong> ${escapeHtml(item["교육_대상적합성"])}</p>
        <p><strong>신청 상태:</strong> ${escapeHtml(item["교육_신청상태"])}</p>
        <p><strong>교육 목적:</strong> ${escapeHtml(item["교육_교육목적"])}</p>
        <p><strong>추가 확인사항:</strong> ${escapeHtml(item["교육_추가확인사항"])}</p>
      `;
    }

    return `
      <div class="detail-card">
        <p><strong>상담ID:</strong> ${escapeHtml(item["상담ID"])}</p>
        <p><strong>지역:</strong> ${escapeHtml(item["지역"])} / <strong>대표자:</strong> ${escapeHtml(item["대표자/원장명"])}</p>
        <p><strong>이메일:</strong> ${escapeHtml(item["이메일"])} / <strong>유입경로:</strong> ${escapeHtml(item["유입경로"])}</p>
        <p><strong>1차 상담 요약:</strong> ${escapeHtml(item["1차 상담 요약"])}</p>
        <p><strong>상담 메모:</strong> ${escapeHtml(item["상담 메모"])}</p>
        ${categoryDetail}
        <p><strong>제안 방향:</strong> ${escapeHtml(item["제안방향"])}</p>
        <p><strong>예상 예산/매출:</strong> ${escapeHtml(item["예상예산매출"])}</p>
        <p><strong>다음 액션:</strong> ${escapeHtml(item["다음액션"])}</p>
        <p><strong>핵심 체크리스트:</strong> ${escapeHtml(item["핵심체크리스트"])}</p>
        <p><strong>후속 안내사항:</strong> ${escapeHtml(item["후속안내사항"])}</p>
      </div>
    `;
  }

  function bindListFilters() {
    const typeEl = document.getElementById("listFilterType");
    const categoryEl = document.getElementById("listFilterCategory");
    const statusEl = document.getElementById("listFilterStatus");
    const keywordEl = document.getElementById("listSearchKeyword");

    if (typeEl) {
      typeEl.addEventListener("change", function() {
        if (crmListData.length > 0) renderCrmList();
      });
    }

    if (categoryEl) {
      categoryEl.addEventListener("change", function() {
        if (crmListData.length > 0) renderCrmList();
      });
    }

    if (statusEl) {
      statusEl.addEventListener("change", function() {
        if (crmListData.length > 0) renderCrmList();
      });
    }

    if (keywordEl) {
      keywordEl.addEventListener("input", function() {
        if (crmListData.length > 0) renderCrmList();
      });
    }
  }

  bindListFilters();
  updateInquiryType();
</script>
