<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>메디하우스 CRM 상담관리</title>

  <style>
    :root {
      --main: #174E4F;
      --main2: #2F6F73;
      --bg: #F4F7F7;
      --line: #D9E4E4;
      --text: #1F2937;
      --muted: #6B7280;
      --soft: #F8FAFA;
      --danger: #B91C1C;
      --mso: #7A5C2E;
      --edu: #5A4B81;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: linear-gradient(180deg, #EFF6F5 0%, #FFFFFF 42%);
      color: var(--text);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    .hero {
      background: var(--main);
      color: #fff;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 18px 45px rgba(23,78,79,.18);
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      opacity: .9;
      line-height: 1.6;
      font-size: 15px;
    }

    .notice {
      margin: 18px 0 24px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px 18px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    form {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 26px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, .06);
    }

    fieldset {
      border: 0;
      padding: 0;
      margin: 0 0 28px;
    }

    legend {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    legend::before {
      content: "";
      width: 8px;
      height: 22px;
      border-radius: 999px;
      background: var(--main2);
      display: inline-block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .grid4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 7px;
      color: #374151;
    }

    .req::after {
      content: " *";
      color: var(--danger);
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid #CBD5D6;
      border-radius: 12px;
      padding: 12px 13px;
      font-size: 14px;
      outline: none;
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--main2);
      box-shadow: 0 0 0 4px rgba(47,111,115,.12);
    }

    textarea {
      min-height: 105px;
      resize: vertical;
      line-height: 1.6;
    }

    .full { grid-column: 1 / -1; }
    .hide { display: none !important; }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 20px;
    }

    .tab-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--main);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .tab-btn.active {
      background: var(--main);
      color: #fff;
      border-color: var(--main);
    }

    .stage-tabs {
      display: flex;
      gap: 8px;
      margin: 0 0 20px;
      flex-wrap: wrap;
    }

    .stage-btn {
      border: 1px solid var(--line);
      background: #F8FAFA;
      color: #374151;
      border-radius: 14px;
      padding: 11px 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .stage-btn.active {
      background: #E7F1F1;
      color: var(--main);
      border-color: var(--main2);
    }

    .section-card {
      border: 1px solid var(--line);
      background: #FCFEFE;
      border-radius: 18px;
      padding: 20px;
      margin-top: 12px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 900;
      color: var(--main);
    }

    .mini-title {
      margin: 20px 0 10px;
      font-size: 14px;
      font-weight: 900;
      color: #111827;
    }

    .check-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .check-item {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 10px 11px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1.35;
    }

    .check-item input {
      width: auto;
      box-shadow: none;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      align-items: center;
      border-top: 1px solid var(--line);
      padding-top: 20px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 13px 18px;
      font-weight: 800;
      cursor: pointer;
      font-size: 14px;
    }

    .primary {
      background: var(--main);
      color: #fff;
    }

    .secondary {
      background: #EEF3F3;
      color: var(--main);
    }

    .result {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      display: none;
      line-height: 1.55;
      font-size: 14px;
    }

    .result.ok {
      display: block;
      background: #ECFDF3;
      color: #166534;
      border: 1px solid #BBF7D0;
    }

    .result.err {
      display: block;
      background: #FEF2F2;
      color: #991B1B;
      border: 1px solid #FECACA;
    }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 860px) {
      .grid, .grid3, .grid4, .check-grid {
        grid-template-columns: 1fr;
      }

      form { padding: 20px; }
      .hero { padding: 24px; }
      .actions { flex-direction: column-reverse; align-items: stretch; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <section class="hero">
      <h1>메디하우스 CRM 상담관리</h1>
      <p>1차 기본상담, 2차 심층상담, 3차 제안/후속관리까지 한 번에 기록하는 내부 CRM 입력폼입니다.</p>
    </section>

    <div class="notice">
      <strong>운영 기준:</strong> 공통 상담정보는 모든 문의에 동일하게 입력하고, 문의유형과 세부카테고리에 따라 2차 상담 항목이 자동으로 변경됩니다.
    </div>

    <form id="crmForm">
      <fieldset>
        <legend>공통 상담 정보</legend>

        <div class="grid3">
          <div>
            <label class="req">상담단계</label>
            <select name="상담단계" id="consultStage" required>
              <option value="1차 기본상담">1차 기본상담</option>
              <option value="2차 심층상담">2차 심층상담</option>
              <option value="3차 제안/후속관리">3차 제안/후속관리</option>
            </select>
          </div>

          <div>
            <label class="req">문의유형</label>
            <select name="문의유형" id="inquiryType" required onchange="updateInquiryType()">
              <option value="">선택</option>
              <option value="MSO">MSO</option>
              <option value="의학교육">의학교육</option>
            </select>
          </div>

          <div>
            <label class="req">세부카테고리</label>
            <select name="세부카테고리" id="detailCategory" required onchange="updateDetailSection()">
              <option value="">문의유형을 먼저 선택</option>
            </select>
          </div>
        </div>

        <div class="grid3" style="margin-top:16px;">
          <div>
            <label>상담상태</label>
            <select name="상담상태">
              <option>신규접수</option>
              <option>1차 상담 완료</option>
              <option>2차 상담 예정</option>
              <option>2차 상담 완료</option>
              <option>제안서 작성중</option>
              <option>제안서 발송</option>
              <option>계약/결제 완료</option>
              <option>보류</option>
              <option>종료</option>
            </select>
          </div>

          <div>
            <label>우선순위</label>
            <select name="우선순위">
              <option>중</option>
              <option>상</option>
              <option>하</option>
            </select>
          </div>

          <div>
            <label>담당자</label>
            <input name="담당자" placeholder="예: 박지원" />
          </div>
        </div>

        <div class="grid3" style="margin-top:16px;">
          <div>
            <label class="req">병원/기관명</label>
            <input name="병원/기관명" required placeholder="예: 메이유의원" />
          </div>

          <div>
            <label>대표자/원장명</label>
            <input name="대표자/원장명" placeholder="예: 정석" />
          </div>

          <div>
            <label>지역</label>
            <input name="지역" placeholder="예: 전남 여수" />
          </div>

          <div>
            <label class="req">문의자명</label>
            <input name="문의자명" required />
          </div>

          <div>
            <label>직함/역할</label>
            <select name="직함/역할">
              <option value="">선택</option>
              <option>의사</option>
              <option>병원장</option>
              <option>대표원장</option>
              <option>직원</option>
              <option>코디네이터</option>
              <option>원무</option>
              <option>간호사</option>
              <option>방사선사</option>
              <option>마케팅 담당자</option>
              <option>기타</option>
            </select>
          </div>

          <div>
            <label class="req">연락처</label>
            <input name="연락처" required placeholder="010-0000-0000" />
          </div>

          <div>
            <label>이메일</label>
            <input name="이메일" type="email" placeholder="name@example.com" />
          </div>

          <div>
            <label>유입경로</label>
            <select name="유입경로">
              <option value="">선택</option>
              <option>홈페이지</option>
              <option>랜딩페이지</option>
              <option>네이버 검색</option>
              <option>네이버 광고</option>
              <option>구글 광고</option>
              <option>인스타그램</option>
              <option>블로그</option>
              <option>유튜브</option>
              <option>기존 회원</option>
              <option>지인 소개</option>
              <option>문자/알림톡</option>
              <option>기타</option>
            </select>
          </div>

          <div>
            <label>선호 연락시간</label>
            <input name="선호 연락시간" placeholder="예: 평일 17시 이후" />
          </div>
        </div>

        <div class="grid" style="margin-top:16px;">
          <div>
            <label>1차 상담 요약</label>
            <textarea name="1차 상담 요약" placeholder="최초 문의 내용, 현재 고민, 서비스 관심도, 다음 상담 필요 여부를 간단히 기록"></textarea>
          </div>

          <div>
            <label>상담 메모</label>
            <textarea name="상담 메모" placeholder="통화 부재, 콜백 예정, 의사결정권자 확인, 특이사항 등"></textarea>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>세부 상담 탭</legend>

        <div id="msoTabs" class="tabs hide">
          <button type="button" class="tab-btn" data-category="마케팅" onclick="selectDetailTab('마케팅')">마케팅</button>
          <button type="button" class="tab-btn" data-category="디자인" onclick="selectDetailTab('디자인')">디자인</button>
          <button type="button" class="tab-btn" data-category="CS교육" onclick="selectDetailTab('CS교육')">CS교육</button>
          <button type="button" class="tab-btn" data-category="운영" onclick="selectDetailTab('운영')">운영</button>
        </div>

        <div id="eduTabs" class="tabs hide">
          <button type="button" class="tab-btn" data-category="위내시경" onclick="selectDetailTab('위내시경')">위내시경</button>
          <button type="button" class="tab-btn" data-category="FNA" onclick="selectDetailTab('FNA')">FNA</button>
          <button type="button" class="tab-btn" data-category="CNB" onclick="selectDetailTab('CNB')">CNB</button>
        </div>

        <div id="detailEmpty" class="section-card">
          <p class="section-title">문의유형과 세부카테고리를 선택하면 상담 항목이 표시됩니다.</p>
        </div>

        <div id="marketingSection" class="section-card hide">
          <p class="section-title">마케팅 심층상담</p>

          <div class="mini-title">2차 상담 핵심 확인</div>
          <div class="check-grid">
            <label class="check-item"><input type="checkbox" name="마케팅_주요고민" value="신규 환자 감소"> 신규 환자 감소</label>
            <label class="check-item"><input type="checkbox" name="마케팅_주요고민" value="매출 감소"> 매출 감소</label>
            <label class="check-item"><input type="checkbox" name="마케팅_주요고민" value="마케팅 성과 부진"> 마케팅 성과 부진</label>
            <label class="check-item"><input type="checkbox" name="마케팅_주요고민" value="온라인 노출 부족"> 온라인 노출 부족</label>
            <label class="check-item"><input type="checkbox" name="마케팅_주요고민" value="블로그 관리 미흡"> 블로그 관리 미흡</label>
            <label class="check-item"><input type="checkbox" name="마케팅_주요고민" value="플레이스 관리 미흡"> 플레이스 관리 미흡</label>
            <label class="check-item"><input type="checkbox" name="마케팅_주요고민" value="광고 효율 저하"> 광고 효율 저하</label>
            <label class="check-item"><input type="checkbox" name="마케팅_주요고민" value="기타"> 기타</label>
          </div>

          <div class="grid3" style="margin-top:16px;">
            <div>
              <label>매출 감소 체감 시점</label>
              <select name="마케팅_매출감소시점">
                <option value="">선택</option>
                <option>3개월 이내</option>
                <option>6개월 이내</option>
                <option>1년 이내</option>
                <option>기타</option>
              </select>
            </div>

            <div>
              <label>전년 대비 감소율</label>
              <select name="마케팅_전년대비감소율">
                <option value="">선택</option>
                <option>10% 이하</option>
                <option>10~20%</option>
                <option>20~30%</option>
                <option>30% 이상</option>
                <option>확인필요</option>
              </select>
            </div>

            <div>
              <label>월 신규 환자 수</label>
              <input name="마케팅_월신규환자수" placeholder="예: 50명" />
            </div>
          </div>

          <div class="grid3" style="margin-top:16px;">
            <div>
              <label>주요 유입 경로</label>
              <select name="마케팅_주요유입경로">
                <option value="">선택</option>
                <option>네이버 검색</option>
                <option>네이버 플레이스</option>
                <option>블로그</option>
                <option>홈페이지</option>
                <option>지인 소개</option>
                <option>기존 고객 소개</option>
                <option>기타</option>
              </select>
            </div>

            <div>
              <label>최근 유입 변화</label>
              <select name="마케팅_최근유입변화">
                <option value="">선택</option>
                <option>증가</option>
                <option>유지</option>
                <option>감소</option>
                <option>확인필요</option>
              </select>
            </div>

            <div>
              <label>월 마케팅 예산</label>
              <input name="마케팅_월예산" placeholder="예: 300만원" />
            </div>
          </div>

          <div class="grid" style="margin-top:16px;">
            <div>
              <label>주요 진료/수익 항목</label>
              <textarea name="마케팅_주요진료수익항목" placeholder="예: 피부성형, 보톡스/필러, 리프팅, 검진 등 매출 비중 높은 항목"></textarea>
            </div>

            <div>
              <label>경쟁 병원 현황</label>
              <textarea name="마케팅_경쟁병원현황" placeholder="경쟁 병원 증가 여부, 주요 경쟁 병원, 우리 병원의 강점/약점"></textarea>
            </div>

            <div>
              <label>현재 마케팅 운영 현황</label>
              <textarea name="마케팅_현재운영현황" placeholder="블로그, 홈페이지, 검색광고, 플레이스, 디자인, 보고서 수령 여부, 만족도"></textarea>
            </div>

            <div>
              <label>온라인 진단 메모</label>
              <textarea name="마케팅_온라인진단메모" placeholder="예: 블로그 연결 안 됨, 2020년 이전 블로그 노출, 동일 사진 반복, 간판 노후화 등"></textarea>
            </div>

            <div class="full">
              <label>향후 개선 희망사항</label>
              <textarea name="마케팅_개선희망사항" placeholder="신규환자 증가, 매출 향상, 검색광고, 블로그 운영, 플레이스 관리, 운영 컨설팅 등"></textarea>
            </div>
          </div>
        </div>

        <div id="designSection" class="section-card hide">
          <p class="section-title">디자인/브랜딩 상담</p>

          <div class="grid3">
            <div>
              <label>필요 디자인 범위</label>
              <select name="디자인_필요범위">
                <option value="">선택</option>
                <option>홈페이지</option>
                <option>랜딩페이지</option>
                <option>병원 브랜딩</option>
                <option>간판/외부 사인</option>
                <option>홍보물</option>
                <option>SNS/카드뉴스</option>
                <option>전체 개선</option>
              </select>
            </div>

            <div>
              <label>현재 홈페이지 상태</label>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzf55GDqiqAzFP-HQVJzY441WR3pFECt9ayzppvdqcstrnUdueeB1X5xH4IELMvpWPw/exec";

    const inquiryType = document.getElementById("inquiryType");
    const detailCategory = document.getElementById("detailCategory");
    const msoTabs = document.getElementById("msoTabs");
    const eduTabs = document.getElementById("eduTabs");
    const result = document.getElementById("result");
    const crmForm = document.getElementById("crmForm");

    const categories = {
      "MSO": ["마케팅", "디자인", "CS교육", "운영"],
      "의학교육": ["위내시경", "FNA", "CNB"]
    };

    const sectionMap = {
      "마케팅": "marketingSection",
      "디자인": "designSection",
      "CS교육": "csSection",
      "운영": "operationSection",
      "위내시경": "educationSection",
      "FNA": "educationSection",
      "CNB": "educationSection"
    };

    function updateInquiryType() {
      const type = inquiryType.value;

      detailCategory.innerHTML = "";

      const first = document.createElement("option");
      first.value = "";
      first.textContent = type ? "세부카테고리 선택" : "문의유형을 먼저 선택";
      detailCategory.appendChild(first);

      (categories[type] || []).forEach(function(item) {
        const opt = document.createElement("option");
        opt.value = item;
        opt.textContent = item;
        detailCategory.appendChild(opt);
      });

      msoTabs.classList.toggle("hide", type !== "MSO");
      eduTabs.classList.toggle("hide", type !== "의학교육");

      clearDetailSections();
      clearActiveTabs();
      document.getElementById("detailEmpty").classList.remove("hide");
    }

    function selectDetailTab(category) {
      detailCategory.value = category;
      updateDetailSection();
    }

    function updateDetailSection() {
      const category = detailCategory.value;

      clearDetailSections();
      clearActiveTabs();

      if (!category) {
        document.getElementById("detailEmpty").classList.remove("hide");
        return;
      }

      const sectionId = sectionMap[category];

      if (sectionId) {
        document.getElementById("detailEmpty").classList.add("hide");
        document.getElementById(sectionId).classList.remove("hide");
      }

      document.querySelectorAll(".tab-btn").forEach(function(btn) {
        if (btn.dataset.category === category) {
          btn.classList.add("active");
        }
      });

      if (category === "위내시경" || category === "FNA" || category === "CNB") {
        const courseSelect = document.querySelector('[name="교육_과정"]');
        if (courseSelect) courseSelect.value = category;
      }
    }

    function clearDetailSections() {
      [
        "marketingSection",
        "designSection",
        "csSection",
        "operationSection",
        "educationSection"
      ].forEach(function(id) {
        document.getElementById(id).classList.add("hide");
      });
    }

    function clearActiveTabs() {
      document.querySelectorAll(".tab-btn").forEach(function(btn) {
        btn.classList.remove("active");
      });
    }

    function resetForm() {
      crmForm.reset();
      updateInquiryType();
      result.className = "result";
      result.innerHTML = "";
    }

    function showMessage(type, message) {
      result.className = "result " + type;
      result.innerHTML = message;
    }

    function getFormDataObject(form) {
      const data = {};
      const formData = new FormData(form);

      for (const [key, value] of formData.entries()) {
        if (data[key]) {
          data[key] += ", " + value;
        } else {
          data[key] = value;
        }
      }

      return data;
    }

    crmForm.addEventListener("submit", async function(e) {
      e.preventDefault();

      if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("여기에_")) {
        showMessage("err", "Apps Script URL이 입력되지 않았습니다.");
        return;
      }

      const payload = getFormDataObject(crmForm);

      payload["상담ID"] = "CRM-" + Date.now();
      payload["접수일시"] = new Date().toLocaleString("sv-SE", {
        timeZone: "Asia/Seoul"
      }).replace("T", " ");

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
          },
          body: new URLSearchParams({
            payload: JSON.stringify(payload)
          })
        });

        showMessage("ok", "저장 요청이 전송되었습니다. 구글시트에서 접수 내역을 확인해주세요.");

      } catch (error) {
        showMessage("err", "저장 중 오류가 발생했습니다: " + error.message);
      }
    });

    updateInquiryType();
  </script>
